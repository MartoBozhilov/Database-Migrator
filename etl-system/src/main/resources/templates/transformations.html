<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformation Models - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="fragments/header :: header('transformations')"></div>
































    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-shuffle"></i> Transformation Models</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModelModal">
                <i class="bi bi-plus-circle"></i> Create New Model
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Models list -->
        <div id="modelsList"></div>
    </div>

    <!-- Create Model Modal -->
    <div class="modal fade" id="createModelModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Transformation Model</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createModelForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Model Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="systemScanId" class="form-label">System Scan (Source)</label>
                            <select class="form-select" id="systemScanId" required>
                                <option value="">Select a system scan...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="targetConnectorId" class="form-label">Target Connector</label>
                            <select class="form-select" id="targetConnectorId" required>
                                <option value="">Select a target connector...</option>
                            </select>
                        </div>
                        <div id="createError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createModel()">Create Model</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="fragments/header :: auth-script"></script>
    <script>
        async function loadModels() {
            try {
                const response = await apiCall('/api/transformation-models');
                const models = await response.json();

                const container = document.getElementById('modelsList');
                document.getElementById('loading').style.display = 'none';

                if (models.length === 0) {
                    container.innerHTML = '<div class="alert alert-info"><i class="bi bi-info-circle"></i> No transformation models yet. Create your first model!</div>';
                    return;
                }

                container.innerHTML = models.map(model => `
                    <div class="list-row" onclick="window.location.href='/transformations/${model.id}'">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${model.name}</h5>
                                <p class="mb-0 text-muted small">
                                    <i class="bi bi-search"></i> Scan: ${model.systemScanName || 'N/A'}
                                    | <i class="bi bi-arrow-right"></i> Target: ${model.targetConnectorName || 'N/A'}
                                    | <i class="bi bi-table"></i> ${model.tableCount || 0} tables
                                </p>
                            </div>
                            <div class="text-end">
                                <span class="badge ${model.isConfirmed ? 'bg-success' : 'bg-warning'}">${model.isConfirmed ? 'CONFIRMED' : 'DRAFT'}</span>
                                <p class="mb-0 text-muted small mt-1">
                                    <i class="bi bi-person-circle"></i> ${model.createdByName || 'Unknown'}
                                    | ${formatDate(model.createdAt)}
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading models:', error);
                document.getElementById('loading').innerHTML = '<div class="alert alert-danger">Error loading transformation models</div>';
            }
        }

        async function loadScansAndConnectors() {
            try {
                const [scansResponse, connectorsResponse] = await Promise.all([
                    apiCall('/api/scans'),
                    apiCall('/api/connectors')
                ]);

                const scans = await scansResponse.json();
                const connectors = await connectorsResponse.json();

                // Populate scans dropdown
                const scanSelect = document.getElementById('systemScanId');
                const completedScans = scans.filter(s => s.status === 'COMPLETED');
                completedScans.forEach(scan => {
                    const option = document.createElement('option');
                    option.value = scan.id;
                    option.textContent = `${scan.name} (${scan.sourceConnectorName})`;
                    scanSelect.appendChild(option);
                });

                // Populate target connectors dropdown
                const connectorSelect = document.getElementById('targetConnectorId');
                const targetConnectors = connectors.filter(c => c.connectorType === 'TARGET');
                targetConnectors.forEach(conn => {
                    const option = document.createElement('option');
                    option.value = conn.id;
                    option.textContent = `${conn.name} (${conn.databaseType})`;
                    connectorSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading scans/connectors:', error);
            }
        }

        async function createModel() {
            const data = {
                name: document.getElementById('name').value,
                systemScanId: parseInt(document.getElementById('systemScanId').value),
                targetConnectorId: parseInt(document.getElementById('targetConnectorId').value)
            };

            const errorDiv = document.getElementById('createError');
            errorDiv.classList.add('d-none');

            try {
                const response = await apiCall('/api/transformation-models', 'POST', data);
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('createModelModal')).hide();
                    document.getElementById('createModelForm').reset();
                    loadModels();
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.message || 'Failed to create transformation model';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        // Load data on page load
        loadModels();
        loadScansAndConnectors();
    </script>
</body>
</html>
