<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Scans - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header('scans')}"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-search"></i> System Scans</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createScanModal">
                <i class="bi bi-plus-circle"></i> Create New Scan
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Scans list -->
        <div id="scansList"></div>
    </div>

    <!-- Create Scan Modal -->
    <div class="modal fade" id="createScanModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create System Scan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createScanForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Scan Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="sourceConnectorId" class="form-label">Source Connector</label>
                            <select class="form-select" id="sourceConnectorId" required>
                                <option value="">Select a connector...</option>
                            </select>
                        </div>
                        <div id="createError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createScan()">Create Scan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: auth-script}"></script>
    <script>
        async function loadScans() {
            try {
                const response = await apiCall('/api/scans');
                const scans = await response.json();

                const container = document.getElementById('scansList');
                document.getElementById('loading').style.display = 'none';

                if (scans.length === 0) {
                    container.innerHTML = '<div class="alert alert-info"><i class="bi bi-info-circle"></i> No system scans yet. Create your first scan!</div>';
                    return;
                }

                container.innerHTML = scans.map(scan => `
                    <div class="list-row" onclick="window.location.href='/scans/${scan.id}'">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${scan.name}</h5>
                                <p class="mb-0 text-muted small">
                                    <i class="bi bi-hdd-network"></i> ${scan.sourceConnectorName || 'N/A'}
                                    | <i class="bi bi-table"></i> ${scan.tableCount || 0} tables
                                    | <i class="bi bi-diagram-3"></i> ${scan.relationCount || 0} relations
                                </p>
                            </div>
                            <div class="text-end">
                                <span class="badge ${getStatusBadgeClass(scan.status)}">${scan.status}</span>
                                <p class="mb-0 text-muted small mt-1">
                                    <i class="bi bi-person-circle"></i> ${scan.createdByName || 'Unknown'}
                                    | ${formatDate(scan.createdAt)}
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading scans:', error);
                document.getElementById('loading').innerHTML = '<div class="alert alert-danger">Error loading scans</div>';
            }
        }

        async function loadConnectors() {
            try {
                const response = await apiCall('/api/connectors');
                const connectors = await response.json();

                const select = document.getElementById('sourceConnectorId');
                const sourceConnectors = connectors.filter(c => c.connectorType === 'SOURCE');

                sourceConnectors.forEach(conn => {
                    const option = document.createElement('option');
                    option.value = conn.id;
                    option.textContent = `${conn.name} (${conn.databaseType})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading connectors:', error);
            }
        }

        async function createScan() {
            const data = {
                name: document.getElementById('name').value,
                sourceConnectorId: parseInt(document.getElementById('sourceConnectorId').value)
            };

            const errorDiv = document.getElementById('createError');
            errorDiv.classList.add('d-none');

            try {
                const response = await apiCall('/api/scans', 'POST', data);
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('createScanModal')).hide();
                    document.getElementById('createScanForm').reset();
                    loadScans();
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.message || 'Failed to create scan';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        }

        function getStatusBadgeClass(status) {
            const classes = {
                'PENDING': 'status-pending',
                'IN_PROGRESS': 'status-in-progress',
                'COMPLETED': 'status-completed',
                'FAILED': 'status-failed'
            };
            return classes[status] || 'bg-secondary';
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        // Load data on page load
        loadScans();
        loadConnectors();
    </script>
</body>
</html>
