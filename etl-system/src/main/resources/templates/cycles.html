<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Cycles - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="fragments/header :: header('cycles')"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-play-circle"></i> Execution Cycles</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createCycleModal">
                <i class="bi bi-plus-circle"></i> Create New Cycle
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Cycles list -->
        <div id="cyclesList"></div>
    </div>

    <!-- Create Cycle Modal -->
    <div class="modal fade" id="createCycleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Execution Cycle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createCycleForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Cycle Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="transformationModelId" class="form-label">Transformation Model</label>
                            <select class="form-select" id="transformationModelId" required>
                                <option value="">Select a transformation model...</option>
                            </select>
                            <small class="text-muted">Note: Execution mode (sequential/parallel) is automatically determined based on target database type. MSSQL targets use sequential execution.</small>
                        </div>
                        <div id="createError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createCycle()">Create Cycle</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="fragments/header :: auth-script"></script>
    <script>
        async function loadCycles() {
            try {
                const response = await apiCall('/api/cycles');
                const cycles = await response.json();

                const container = document.getElementById('cyclesList');
                document.getElementById('loading').style.display = 'none';

                if (cycles.length === 0) {
                    container.innerHTML = '<div class="alert alert-info"><i class="bi bi-info-circle"></i> No execution cycles yet. Create your first cycle!</div>';
                    return;
                }

                container.innerHTML = cycles.map(cycle => `
                    <div class="list-row" onclick="window.location.href='/cycles/${cycle.id}'">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${cycle.name}</h5>
                                <p class="mb-0 text-muted small">
                                    <i class="bi bi-shuffle"></i> Model: ${cycle.transformationModelName || 'N/A'}
                                    | <i class="bi bi-list-check"></i> ${cycle.taskCount || 0} tasks
                                    | <i class="bi bi-hdd"></i> Target: ${cycle.targetConnectorName || 'N/A'}
                                </p>
                            </div>
                            <div class="text-end">
                                <span class="badge ${getStatusBadgeClass(cycle.status)}">${cycle.status}</span>
                                <p class="mb-0 text-muted small mt-1">
                                    <i class="bi bi-person-circle"></i> ${cycle.createdByName || 'Unknown'}
                                </p>
                                ${cycle.startedAt ?
                                    `<p class="mb-0 text-muted small">Started: ${formatDate(cycle.startedAt)}</p>
                                     ${cycle.completedAt ? `<p class="mb-0 text-muted small">Finished: ${formatDate(cycle.completedAt)}</p>` : ''}`
                                    :
                                    `<p class="mb-0 text-muted small">Created: ${formatDate(cycle.createdAt)}</p>`
                                }
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading cycles:', error);
                document.getElementById('loading').innerHTML = '<div class="alert alert-danger">Error loading execution cycles</div>';
            }
        }

        async function loadTransformationModels() {
            try {
                const response = await apiCall('/api/transformation-models');
                const models = await response.json();

                const select = document.getElementById('transformationModelId');
                const confirmedModels = models.filter(m => m.isConfirmed);

                confirmedModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = `${model.name} (${model.systemScanName} → ${model.targetConnectorName})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading transformation models:', error);
            }
        }

        async function createCycle() {
            const data = {
                name: document.getElementById('name').value,
                transformationModelId: parseInt(document.getElementById('transformationModelId').value)
            };

            const errorDiv = document.getElementById('createError');
            errorDiv.classList.add('d-none');

            try {
                const response = await apiCall('/api/cycles', 'POST', data);
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('createCycleModal')).hide();
                    document.getElementById('createCycleForm').reset();
                    loadCycles();
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.message || 'Failed to create execution cycle';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        }

        function getStatusBadgeClass(status) {
            const classes = {
                'PENDING': 'status-pending',
                'IN_PROGRESS': 'status-in-progress',
                'COMPLETED': 'status-completed',
                'FAILED': 'status-failed'
            };
            return classes[status] || 'bg-secondary';
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        // Load data on page load
        loadCycles();
        loadTransformationModels();
    </script>
</body>
</html>
