<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header('profile')}"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <h2 class="mb-4"><i class="bi bi-person-circle"></i> My Profile</h2>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Profile details -->
        <div id="profileDetails" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5><i class="bi bi-person"></i> User Information</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="30%">Username:</th>
                                    <td id="username"></td>
                                </tr>
                                <tr>
                                    <th>Email:</th>
                                    <td id="email"></td>
                                </tr>
                                <tr>
                                    <th>First Name:</th>
                                    <td id="firstName"></td>
                                </tr>
                                <tr>
                                    <th>Last Name:</th>
                                    <td id="lastName"></td>
                                </tr>
                                <tr>
                                    <th>Member Since:</th>
                                    <td id="createdAt"></td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">
                            <h5><i class="bi bi-building"></i> Organization</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="30%">Organization Name:</th>
                                    <td id="orgName"></td>
                                </tr>
                                <tr>
                                    <th>Company Name:</th>
                                    <td id="orgCompanyName"></td>
                                </tr>
                                <tr>
                                    <th>Location:</th>
                                    <td id="orgLocation"></td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">
                            <h5><i class="bi bi-shield-check"></i> Roles & Permissions</h5>
                        </div>
                        <div class="card-body">
                            <div id="rolesList"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5><i class="bi bi-gear"></i> Actions</h5>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-outline-primary w-100 mb-2" onclick="changePassword()">
                                <i class="bi bi-key"></i> Change Password
                            </button>
                            <button class="btn btn-outline-danger w-100" onclick="logout()">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="changePasswordModalLabel"><i class="bi bi-key"></i> Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="passwordError" class="alert alert-danger" style="display: none;"></div>
                    <div id="passwordSuccess" class="alert alert-success" style="display: none;"></div>

                    <form id="changePasswordForm">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Current Password</label>
                            <input type="password" class="form-control" id="currentPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                            <div class="form-text">Password must be at least 6 characters long</div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitChangePassword()">Change Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: auth-script}"></script>
    <script>
        async function loadProfile() {
            try {
                const response = await apiCall('/api/auth/me');
                const user = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('profileDetails').style.display = 'block';

                // User information
                document.getElementById('username').textContent = user.username;
                document.getElementById('email').textContent = user.email;
                document.getElementById('firstName').textContent = user.firstName || 'N/A';
                document.getElementById('lastName').textContent = user.lastName || 'N/A';
                document.getElementById('createdAt').textContent = formatDate(user.createdAt);

                // Organization information
                if (user.organization) {
                    document.getElementById('orgName').textContent = user.organization.name;
                    document.getElementById('orgCompanyName').textContent = user.organization.companyName || 'N/A';
                    document.getElementById('orgLocation').textContent = user.organization.location || 'N/A';
                }

                // Roles
                const rolesList = document.getElementById('rolesList');
                if (user.roles && user.roles.length > 0) {
                    rolesList.innerHTML = user.roles.map(role =>
                        `<span class="badge bg-primary me-2 mb-2">${formatRoleName(role)}</span>`
                    ).join('');
                } else {
                    rolesList.innerHTML = '<p class="text-muted mb-0">No roles assigned</p>';
                }

            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('loading').innerHTML =
                    '<div class="alert alert-danger">Error loading profile</div>';
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        function formatRoleName(role) {
            // Convert CONNECTOR_USER to "Connector User"
            return role.split('_').map(word =>
                word.charAt(0) + word.slice(1).toLowerCase()
            ).join(' ');
        }

        function changePassword() {
            const modal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
            modal.show();

            // Clear form and messages
            document.getElementById('changePasswordForm').reset();
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('passwordSuccess').style.display = 'none';
        }

        async function submitChangePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous messages
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('passwordSuccess').style.display = 'none';

            // Client-side validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                showPasswordError('All fields are required');
                return;
            }

            if (newPassword.length < 6) {
                showPasswordError('New password must be at least 6 characters long');
                return;
            }

            if (newPassword !== confirmPassword) {
                showPasswordError('New password and confirm password do not match');
                return;
            }

            try {
                const response = await apiCall('/api/auth/change-password', 'PUT', {
                    currentPassword,
                    newPassword,
                    confirmPassword
                });

                if (response.ok) {
                    document.getElementById('passwordSuccess').textContent = 'Password changed successfully!';
                    document.getElementById('passwordSuccess').style.display = 'block';
                    document.getElementById('changePasswordForm').reset();

                    // Close modal after 2 seconds
                    setTimeout(() => {
                        const modal = bootstrap.Modal.getInstance(document.getElementById('changePasswordModal'));
                        modal.hide();
                    }, 2000);
                } else {
                    const error = await response.json();
                    showPasswordError(error.message || 'Failed to change password');
                }
            } catch (error) {
                console.error('Error changing password:', error);
                showPasswordError('An error occurred while changing password');
            }
        }

        function showPasswordError(message) {
            const errorDiv = document.getElementById('passwordError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        }

        // Load profile on page load
        loadProfile();
    </script>
</body>
</html>
