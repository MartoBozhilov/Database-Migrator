<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">Database Migrator</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/connectors">Connectors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/scans">System Scans</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/transformations">Transformations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cycles">Execution Cycles</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <span class="navbar-text me-3" id="userEmail"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Dashboard</h1>

        <div class="row">
            <div class="col-md-3">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">Connectors</h5>
                                <h2 id="connectorCount">-</h2>
                            </div>
                            <i class="bi bi-hdd-network fs-1"></i>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="/connectors" class="text-white text-decoration-none">View all <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">System Scans</h5>
                                <h2 id="scanCount">-</h2>
                            </div>
                            <i class="bi bi-search fs-1"></i>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="/scans" class="text-white text-decoration-none">View all <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">Transformations</h5>
                                <h2 id="transformationCount">-</h2>
                            </div>
                            <i class="bi bi-shuffle fs-1"></i>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="/transformations" class="text-white text-decoration-none">View all <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">Execution Cycles</h5>
                                <h2 id="cycleCount">-</h2>
                            </div>
                            <i class="bi bi-play-circle fs-1"></i>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="/cycles" class="text-white text-decoration-none">View all <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Recent Execution Cycles</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th>Completed</th>
                                    </tr>
                                </thead>
                                <tbody id="recentCycles">
                                    <tr>
                                        <td colspan="5" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = '/login';
        }

        // Display user email
        document.getElementById('userEmail').textContent = user.email || '';

        // Logout function
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // API helper function
        async function apiCall(endpoint) {
            const response = await fetch(endpoint, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            if (response.status === 401) {
                logout();
                return null;
            }
            return response.json();
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                const [connectors, scans, transformations, cycles] = await Promise.all([
                    apiCall('/api/connectors'),
                    apiCall('/api/scans'),
                    apiCall('/api/transformation-models'),
                    apiCall('/api/cycles')
                ]);

                document.getElementById('connectorCount').textContent = connectors?.length || 0;
                document.getElementById('scanCount').textContent = scans?.length || 0;
                document.getElementById('transformationCount').textContent = transformations?.length || 0;
                document.getElementById('cycleCount').textContent = cycles?.length || 0;

                // Display recent cycles
                if (cycles && cycles.length > 0) {
                    const tbody = document.getElementById('recentCycles');
                    tbody.innerHTML = cycles.slice(0, 5).map(cycle => `
                        <tr>
                            <td>${cycle.id}</td>
                            <td>${cycle.name}</td>
                            <td><span class="badge bg-${getStatusColor(cycle.status)}">${cycle.status}</span></td>
                            <td>${new Date(cycle.createdAt).toLocaleString()}</td>
                            <td>${cycle.completedAt ? new Date(cycle.completedAt).toLocaleString() : '-'}</td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('recentCycles').innerHTML = '<tr><td colspan="5" class="text-center">No cycles yet</td></tr>';
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function getStatusColor(status) {
            const colors = {
                'PENDING': 'secondary',
                'IN_PROGRESS': 'primary',
                'COMPLETED': 'success',
                'FAILED': 'danger'
            };
            return colors[status] || 'secondary';
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
