<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header('admin')}"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people"></i> Users</h2>
            <button class="btn btn-success" onclick="showCreateModal()">
                <i class="bi bi-person-plus"></i> Create User
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Users list -->
        <div id="usersList" style="display: none;">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Organization</th>
                                    <th>Roles</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create User Modal -->
    <div class="modal fade" id="createUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-person-plus"></i> Create User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="createError" class="alert alert-danger" style="display: none;"></div>
                    <form id="createUserForm">
                        <div class="mb-3" id="organizationSelector" style="display: none;">
                            <label for="organizationId" class="form-label">Organization *</label>
                            <select class="form-select" id="organizationId">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                            <div class="form-text">Password must be at least 6 characters long</div>
                        </div>
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName">
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="createUser()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: auth-script}"></script>
    <script>
        async function loadUsers() {
            try {
                const userFromStorage = JSON.parse(localStorage.getItem('user') || '{}');
                const userIsSuperAdmin = userFromStorage.roles && userFromStorage.roles.includes('ADMIN');

                const response = await apiCall('/api/users');
                const users = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersList').style.display = 'block';

                const tbody = document.getElementById('usersTableBody');

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No users found</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(userData => `
                    <tr style="cursor: pointer;" onclick="viewUser(${userData.id})">
                        <td><strong>${escapeHtml(userData.username)}</strong></td>
                        <td>${escapeHtml(userData.email)}</td>
                        <td>${escapeHtml(userData.organization?.name || 'N/A')}</td>
                        <td>${userData.roles.map(role => `<span class="badge bg-primary me-1">${formatRoleName(role)}</span>`).join('')}</td>
                        <td>${formatDate(userData.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); viewUser(${userData.id})">
                                <i class="bi bi-eye"></i> View
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('loading').innerHTML =
                    '<div class="alert alert-danger">Error loading users</div>';
            }
        }

        async function loadOrganizations() {
            const userFromStorage = JSON.parse(localStorage.getItem('user') || '{}');
            const userIsSuperAdmin = userFromStorage.roles && userFromStorage.roles.includes('ADMIN');

            if (!userIsSuperAdmin) return;

            try {
                const response = await apiCall('/api/admin/organizations');
                const organizations = await response.json();

                const select = document.getElementById('organizationId');
                select.innerHTML = '<option value="">Select organization...</option>' +
                    organizations.map(org =>
                        `<option value="${org.id}">${escapeHtml(org.name)}</option>`
                    ).join('');
            } catch (error) {
                console.error('Error loading organizations:', error);
            }
        }

        function showCreateModal() {
            const modal = new bootstrap.Modal(document.getElementById('createUserModal'));
            modal.show();
            document.getElementById('createUserForm').reset();
            document.getElementById('createError').style.display = 'none';

            const userFromStorage = JSON.parse(localStorage.getItem('user') || '{}');
            const userIsSuperAdmin = userFromStorage.roles && userFromStorage.roles.includes('ADMIN');

            if (userIsSuperAdmin) {
                document.getElementById('organizationSelector').style.display = 'block';
                loadOrganizations();
            }
        }

        async function createUser() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();

            if (!username || !email || !password) {
                showError('Username, email, and password are required');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            const requestBody = {
                username,
                email,
                password,
                firstName: firstName || null,
                lastName: lastName || null
            };

            const userFromStorage = JSON.parse(localStorage.getItem('user') || '{}');
            const userIsSuperAdmin = userFromStorage.roles && userFromStorage.roles.includes('ADMIN');

            if (userIsSuperAdmin) {
                const organizationId = document.getElementById('organizationId').value;
                if (!organizationId) {
                    showError('Please select an organization');
                    return;
                }
                requestBody.organizationId = parseInt(organizationId);
            }

            try {
                const response = await apiCall('/api/users', 'POST', requestBody);

                if (response.ok) {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('createUserModal'));
                    modal.hide();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showError(error.message || 'Failed to create user');
                }
            } catch (error) {
                console.error('Error creating user:', error);
                showError('An error occurred while creating user');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('createError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function viewUser(id) {
            window.location.href = `/admin/users/${id}`;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        function formatRoleName(role) {
            return role.split('_').map(word =>
                word.charAt(0) + word.slice(1).toLowerCase()
            ).join(' ');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadUsers();
    </script>
</body>
</html>
