<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Details - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header('admin')}"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <a href="/admin/organizations" class="btn btn-outline-secondary btn-sm mb-2">
                    <i class="bi bi-arrow-left"></i> Back to Organizations
                </a>
                <h2><i class="bi bi-building"></i> <span id="orgName"></span></h2>
            </div>
            <button class="btn btn-success" onclick="showCreateUserModal()">
                <i class="bi bi-person-plus"></i> Create Migration Admin
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Organization details -->
        <div id="organizationDetails" style="display: none;">
            <div class="row">
                <div class="col-md-4">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5><i class="bi bi-info-circle"></i> Organization Information</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%">Name:</th>
                                    <td id="detailName"></td>
                                </tr>
                                <tr>
                                    <th>Company Name:</th>
                                    <td id="detailCompanyName"></td>
                                </tr>
                                <tr>
                                    <th>Location:</th>
                                    <td id="detailLocation"></td>
                                </tr>
                                <tr>
                                    <th>Created:</th>
                                    <td id="detailCreatedAt"></td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="bi bi-people"></i> Users (<span id="userCount">0</span>)</h5>
                        </div>
                        <div class="card-body">
                            <div id="usersLoading" class="text-center my-3">
                                <div class="spinner-border spinner-border-sm text-success" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                            <div id="usersList" style="display: none;">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>Username</th>
                                                <th>Email</th>
                                                <th>Roles</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="usersTableBody">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Migration Admin Modal -->
    <div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createUserModalLabel"><i class="bi bi-person-plus"></i> Create Migration Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="createError" class="alert alert-danger" style="display: none;"></div>

                    <form id="createUserForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                            <div class="form-text">Password must be at least 6 characters long</div>
                        </div>
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName">
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="createMigrationAdmin()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: auth-script}"></script>
    <script>
        const orgId = window.location.pathname.split('/').pop();

        async function loadOrganization() {
            try {
                const response = await apiCall(`/api/admin/organizations/${orgId}`);
                const org = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('organizationDetails').style.display = 'block';

                document.getElementById('orgName').textContent = org.name;
                document.getElementById('detailName').textContent = org.name;
                document.getElementById('detailCompanyName').textContent = org.companyName || 'N/A';
                document.getElementById('detailLocation').textContent = org.location || 'N/A';
                document.getElementById('detailCreatedAt').textContent = formatDate(org.createdAt);

                loadUsers();
            } catch (error) {
                console.error('Error loading organization:', error);
                document.getElementById('loading').innerHTML =
                    '<div class="alert alert-danger">Error loading organization details</div>';
            }
        }

        async function loadUsers() {
            try {
                const response = await apiCall(`/api/admin/organizations/${orgId}/users`);
                const users = await response.json();

                document.getElementById('usersLoading').style.display = 'none';
                document.getElementById('usersList').style.display = 'block';
                document.getElementById('userCount').textContent = users.length;

                const tbody = document.getElementById('usersTableBody');

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No users found</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td><strong>${escapeHtml(user.username)}</strong></td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${user.roles.map(role => `<span class="badge bg-primary me-1">${formatRoleName(role)}</span>`).join('')}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewUser(${user.id})">
                                <i class="bi bi-eye"></i> View
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersLoading').innerHTML =
                    '<div class="alert alert-danger">Error loading users</div>';
            }
        }

        function showCreateUserModal() {
            const modal = new bootstrap.Modal(document.getElementById('createUserModal'));
            modal.show();
            document.getElementById('createUserForm').reset();
            document.getElementById('createError').style.display = 'none';
        }

        async function createMigrationAdmin() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();

            if (!username || !email || !password) {
                showError('Username, email, and password are required');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            try {
                const response = await apiCall('/api/admin/organizations/users', 'POST', {
                    username,
                    email,
                    password,
                    firstName: firstName || null,
                    lastName: lastName || null,
                    organizationId: parseInt(orgId)
                });

                if (response.ok) {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('createUserModal'));
                    modal.hide();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showError(error.message || 'Failed to create migration admin');
                }
            } catch (error) {
                console.error('Error creating migration admin:', error);
                showError('An error occurred while creating migration admin');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('createError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function viewUser(id) {
            window.location.href = `/admin/users/${id}`;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        function formatRoleName(role) {
            return role.split('_').map(word =>
                word.charAt(0) + word.slice(1).toLowerCase()
            ).join(' ');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load organization on page load
        loadOrganization();
    </script>
</body>
</html>
