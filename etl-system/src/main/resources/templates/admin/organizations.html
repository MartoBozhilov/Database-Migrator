<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizations - Database Migrator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header('admin')}"></div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-building"></i> Organizations</h2>
            <button class="btn btn-success" onclick="showCreateModal()">
                <i class="bi bi-plus-circle"></i> Create Organization
            </button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Organizations list -->
        <div id="organizationsList" style="display: none;">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Company Name</th>
                                    <th>Location</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orgsTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Organization Modal -->
    <div class="modal fade" id="createOrgModal" tabindex="-1" aria-labelledby="createOrgModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createOrgModalLabel"><i class="bi bi-building"></i> Create Organization</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="createError" class="alert alert-danger" style="display: none;"></div>

                    <form id="createOrgForm">
                        <div class="mb-3">
                            <label for="orgName" class="form-label">Organization Name *</label>
                            <input type="text" class="form-control" id="orgName" required>
                        </div>
                        <div class="mb-3">
                            <label for="companyName" class="form-label">Company Name</label>
                            <input type="text" class="form-control" id="companyName">
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="createOrganization()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: auth-script}"></script>
    <script>
        async function loadOrganizations() {
            try {
                const response = await apiCall('/api/admin/organizations');
                const organizations = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('organizationsList').style.display = 'block';

                const tbody = document.getElementById('orgsTableBody');

                if (organizations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No organizations found</td></tr>';
                    return;
                }

                tbody.innerHTML = organizations.map(org => `
                    <tr style="cursor: pointer;" onclick="viewOrganization(${org.id})">
                        <td><strong>${escapeHtml(org.name)}</strong></td>
                        <td>${escapeHtml(org.companyName || 'N/A')}</td>
                        <td>${escapeHtml(org.location || 'N/A')}</td>
                        <td>${formatDate(org.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); viewOrganization(${org.id})">
                                <i class="bi bi-eye"></i> View
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error loading organizations:', error);
                document.getElementById('loading').innerHTML =
                    '<div class="alert alert-danger">Error loading organizations</div>';
            }
        }

        function showCreateModal() {
            const modal = new bootstrap.Modal(document.getElementById('createOrgModal'));
            modal.show();
            document.getElementById('createOrgForm').reset();
            document.getElementById('createError').style.display = 'none';
        }

        async function createOrganization() {
            const name = document.getElementById('orgName').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const location = document.getElementById('location').value.trim();

            if (!name) {
                showError('Organization name is required');
                return;
            }

            try {
                const response = await apiCall('/api/admin/organizations', 'POST', {
                    name,
                    companyName: companyName || null,
                    location: location || null
                });

                if (response.ok) {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('createOrgModal'));
                    modal.hide();
                    loadOrganizations();
                } else {
                    const error = await response.json();
                    showError(error.message || 'Failed to create organization');
                }
            } catch (error) {
                console.error('Error creating organization:', error);
                showError('An error occurred while creating organization');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('createError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function viewOrganization(id) {
            window.location.href = `/admin/organizations/${id}`;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load organizations on page load
        loadOrganizations();
    </script>
</body>
</html>
